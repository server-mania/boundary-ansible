#ansible-playbook update_pve.yml -K

---
- name: Proxmox VE ホストのアップデートとアップグレード
  hosts: proxmox
  
  vars:
    vault_addr: "{{ lookup('env', 'VAULT_ADDR') }}"
    v_token: "{{ lookup('env', 'VAULT_TOKEN') }}"
    
  tasks:
    - name: Vaultから認証情報を取得 (Module版)
      community.hashi_vault.vault_read:
        path: "ad/creds/ldapci-role"
        url: "{{ vault_addr }}"
        token: "{{ v_token }}"
        validate_certs: false
      register: vault_secret

    - name: パスワードを become 用変数にセット
      ansible.builtin.set_fact:
        ansible_become_password: "{{ vault_secret.data.data.current_password }}"
      delegate_to: localhost
      run_once: true
      no_log: true

    - name: aptキャッシュの更新と dist-upgrade の実行
      ansible.builtin.apt:
        update_cache: yes
        upgrade: dist
        # 不要になった依存パッケージを自動削除する (apt autoremove に相当)
        autoremove: yes
        # キャッシュの有効期限を秒で指定（1時間以内に実行されていればupdateをスキップ）
        cache_valid_time: 3600
      become: true

    - name: 再起動が必要かどうかを確認する
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: 再起動が必要なホストを通知する
      ansible.builtin.debug:
        msg: "このホストはカーネル等の更新が完了したため、再起動が必要です。"
      when: reboot_required_file.stat.exists
